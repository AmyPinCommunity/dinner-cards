<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Conversation Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F8F3EC;
    --black: #1A1714;
    --red: #C0392B;
    --gold: #B8903A;
    --blue: #1B4F72;
    --jewel: #2E4057;
    --light-bg: #FAF7F2;
    --border: #D4C5A9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--cream);
    color: var(--black);
    padding: 20px;
  }

  /* ── SCREEN UI ── */
  .screen-only {
    max-width: 1200px;
    margin: 0 auto 40px;
  }

  .header {
    text-align: center;
    padding: 50px 20px 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-eyebrow {
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 400;
    line-height: 1.15;
    color: var(--black);
    margin-bottom: 12px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--red);
  }

  .header p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: #6B5E4E;
    font-weight: 300;
    margin-bottom: 30px;
  }

  /* Filters */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 40px;
  }

  .filter-btn {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 9px 22px;
    border: 1px solid var(--border);
    background: transparent;
    color: #6B5E4E;
    cursor: pointer;
    transition: all 0.25s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--black);
    border-color: var(--black);
    color: var(--cream);
  }

  .filter-btn.intensity-light.active       { background: #4A7C59; border-color: #4A7C59; }
  .filter-btn.intensity-medium.active      { background: var(--blue); border-color: var(--blue); }
  .filter-btn.intensity-deep.active        { background: var(--red); border-color: var(--red); }
  .filter-btn.intensity-wild.active        { background: var(--gold); border-color: var(--gold); color: white; }
  .filter-btn.intensity-instruction.active { background: #4A3060; border-color: #4A3060; color: white; }

  /* Wild card — gold accent */
  .card.Wild .card-accent        { background: linear-gradient(90deg, #B8903A, #E8C97A, #B8903A); }
  .card.Wild .intensity-badge    { background: #FDF3DC; color: #8A6520; }
  .card.Wild .card-theme         { color: #7A5518; }
  .card.Wild .card-divider       { background: #D4A830; }
  .card.Wild                     { border-color: #D4C080; }

  /* Instruction card — deep plum accent */
  .card.Instruction .card-accent     { background: linear-gradient(90deg, #4A3060, #8B62B8, #4A3060); }
  .card.Instruction .intensity-badge { background: #F0EAF8; color: #4A3060; }
  .card.Instruction .card-theme      { color: #3A2050; }
  .card.Instruction .card-divider    { background: #8B62B8; }
  .card.Instruction                  { border-color: #C8B0E0; }

  /* Wild card — no numbered list, use a different layout */
  .card.Wild ol li::before,
  .card.Instruction ol li::before { color: #B8903A; }

  .stats {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #9B8E7E;
    text-align: center;
    margin-bottom: 30px;
  }

  /* Card Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  /* CARD */
  .card {
    background: white;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
    page-break-inside: avoid;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(26,23,20,0.12);
  }

  .card-accent {
    height: 4px;
    width: 100%;
  }

  .card.Light  .card-accent { background: #4A7C59; }
  .card.Medium .card-accent { background: var(--blue); }
  .card.Deep   .card-accent { background: var(--red); }

  .card-inner {
    padding: 28px 26px 24px;
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }

  .card-number {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 0.25em;
    color: #B0A090;
  }

  .intensity-badge {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 0;
  }

  .card.Light  .intensity-badge { background: #EBF4ED; color: #4A7C59; }
  .card.Medium .intensity-badge { background: #EAF0F6; color: var(--blue); }
  .card.Deep   .intensity-badge { background: #FBEAEA; color: var(--red); }

  .card-theme {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 18px;
    line-height: 1.3;
  }

  .card-divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin-bottom: 18px;
  }

  .card ol {
    list-style: none;
    padding: 0;
    counter-reset: q;
  }

  .card ol li {
    counter-increment: q;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.65;
    color: #3D3529;
    padding: 8px 0 8px 22px;
    position: relative;
    border-bottom: 1px solid #F0E8DC;
  }

  .card ol li:last-child { border-bottom: none; }

  .card ol li::before {
    content: counter(q);
    position: absolute;
    left: 0;
    top: 10px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    color: #C5B49A;
    letter-spacing: 0.05em;
  }

  .card.hidden { display: none; }

  /* Print button */
  .print-bar {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .print-btn {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 13px 26px;
    background: var(--black);
    color: var(--cream);
    border: none;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .print-btn:hover { background: var(--red); }

  /* ══════════════════════════════
     PRINT STYLES — Canva-ready
     1 card per page, never split
  ══════════════════════════════ */
  @media print {
    @page { size: letter portrait; margin: 0.6in; }

    body { background: white; padding: 0; }

    .screen-only,
    .print-bar { display: none !important; }

    /* Single column — one card per page */
    .card-grid {
      display: block;
    }

    .card {
      display: block;
      width: 100%;
      max-width: 5in;
      margin: 0 auto;
      border: 1.5px solid #ccc;
      box-shadow: none;
      break-inside: avoid;
      page-break-inside: avoid;
      break-after: page;
      page-break-after: always;
    }

    /* Don't force a blank page after the very last card */
    .card:last-child {
      break-after: avoid;
      page-break-after: avoid;
    }

    .card:hover { transform: none; box-shadow: none; }

    .card.hidden { display: none !important; }

    .card-inner { padding: 24px 28px 20px; }

    .card-theme { font-size: 20px; margin-bottom: 14px; }

    .card-divider { margin-bottom: 14px; }

    .card ol li {
      font-size: 14px;
      line-height: 1.65;
      padding: 10px 0 10px 24px;
    }

    .card-number { font-size: 11px; }
    .intensity-badge { font-size: 10px; }
  }
</style>
</head>
<body>

<div class="screen-only">
  <div class="header">
    <div class="header-eyebrow">216 Cards · 3 Questions Each</div>
    <h1>Dinner for <em>Two</em></h1>
    <p>Conversation cards for couples — no work, no kids, no to-do lists.</p>

    <div class="controls" id="controls">
      <button class="filter-btn active" data-filter="all">All Cards</button>
      <button class="filter-btn intensity-light" data-filter="Light">🌿 Light</button>
      <button class="filter-btn intensity-medium" data-filter="Medium">✦ Medium</button>
      <button class="filter-btn intensity-deep" data-filter="Deep">🔥 Deep</button>
      <button class="filter-btn intensity-wild" data-filter="Wild">★ Wild</button>
      <button class="filter-btn intensity-instruction" data-filter="Instruction">◈ How To Play</button>
    </div>
  </div>

  <div class="stats" id="stats">Showing all 216 cards</div>
</div>

<div class="card-grid" id="cardGrid"></div>

<div class="print-bar">
  <button class="print-btn" onclick="window.print()">⬡ Print This Deck</button>
</div>

<script>
const cards = [
  { id:1, theme:"Flirty & Playful", intensity:"Light", questions:["What's something about you that takes people by surprise once they really get to know you?","What's the most spontaneous thing you've ever done — and did it pay off?","If we had no obligations this weekend and unlimited resources, what would you plan for us?"] },
  { id:2, theme:"Food & Taste", intensity:"Light", questions:["If you could only eat the cuisine of one country for the rest of your life, which would you choose?","What's the most memorable meal you've ever had — and what made it unforgettable?","Is there a food from your childhood that still tastes like comfort to you?"] },
  { id:3, theme:"Guilty Pleasures", intensity:"Light", questions:["What's a TV show, movie, or song you love that you'd be slightly embarrassed to admit publicly?","What's a habit or ritual you have that seems odd to others but feels totally normal to you?","What's something you do when no one is watching that you'd never do in public?"] },
  { id:4, theme:"Dream Destinations", intensity:"Light", questions:["If you could teleport anywhere in the world right now, where would you go?","Is there a place you've been that you'd love to return to — but with different eyes?","What's a destination most people wouldn't think to visit that you think is extraordinary?"] },
  { id:5, theme:"Superpower Fantasy", intensity:"Light", questions:["If you had one superpower for a single day, what would it be and how would you use it?","Would you rather be invisible or be able to fly — and what does your answer say about you?","If you could instantly know one thing — any fact, language, or skill — what would you choose?"] },
  { id:6, theme:"Animals & Nature", intensity:"Light", questions:["If you were reincarnated as an animal, what do you think you'd be — and what would you want to be?","What's the most awe-inspiring thing you've ever witnessed in nature?","Do you feel more restored by being near water, in forests, or somewhere else entirely?"] },
  { id:7, theme:"Pop Culture", intensity:"Light", questions:["What movie or show do you think everyone should watch at least once — and why?","Is there a cultural moment — a song, a movie release, a world event — that defined a chapter of your life?","What fictional world would you most want to live in, even knowing its dangers?"] },
  { id:8, theme:"Fashion & Style", intensity:"Light", questions:["If your personal style was a decade, a city, and a mood — what would they be?","What's one outfit or look you wore in your past that felt most authentically you?","Is there a style or aesthetic you admire but have never had the courage to try?"] },
  { id:9, theme:"Dream Home", intensity:"Light", questions:["If you could live anywhere in the world — not just visit — where would it be?","Describe your ideal home in three words. What does each word reveal?","Would you rather have a sprawling countryside estate, a penthouse in a great city, or something else entirely?"] },
  { id:10, theme:"Music & Mood", intensity:"Light", questions:["What song could you listen to a hundred times and never get tired of?","Is there a piece of music that instantly transports you to a specific memory or feeling?","If your life had a soundtrack, what genre would carry the majority of it?"] },
  { id:11, theme:"The Bucket List", intensity:"Light", questions:["What's one experience you haven't had yet that you think about more than most?","Is there something on your bucket list that you secretly worry you'll never do?","What's something wild, adventurous, or unusual you'd do if fear wasn't a factor?"] },
  { id:12, theme:"Childhood Treasures", intensity:"Light", questions:["What was your absolute favorite thing to do on a summer day as a kid?","Is there a toy, game, or show from your childhood you'd want to revisit as an adult?","What's the most mischievous thing you got away with as a kid?"] },
  { id:13, theme:"Sense & Sensation", intensity:"Light", questions:["What's a smell that immediately takes you somewhere else — a place, a time, a person?","What texture, sound, or sensation do you find unexpectedly soothing?","If you had to describe your happiest memory using only the five senses, what would you describe?"] },
  { id:14, theme:"Humor & Laughter", intensity:"Light", questions:["What's the funniest thing that has ever happened to you in public?","Is there a joke or story you've told so many times it's become part of your personal mythology?","What kind of humor do you find irresistible — and what kind falls completely flat for you?"] },
  { id:15, theme:"Seasons & Rituals", intensity:"Light", questions:["What's your favorite season — and what specific moment within it do you love most?","Is there a personal ritual or habit tied to a time of year that brings you real joy?","If you could freeze one day of the year and relive it annually, which would you choose?"] },
  { id:16, theme:"Games & Competition", intensity:"Light", questions:["Are you a sore loser, a gracious winner, or something more complicated than either?","What game — board, card, sport, or video — reveals the most about your personality?","If we were competing right now, what would you bet — and what game would you propose?"] },
  { id:17, theme:"Indulgences", intensity:"Light", questions:["What's your most decadent, unapologetic personal indulgence?","Is there a luxury — large or small — that you think is completely worth it every single time?","What would your perfect lazy Sunday look like from start to finish?"] },
  { id:18, theme:"Wanderlust", intensity:"Light", questions:["Are you a plan-everything traveler or a figure-it-out-when-you-get-there traveler?","What's the most unexpectedly wonderful thing that's happened to you while traveling?","If you had to move to another country tomorrow, which would you choose and why?"] },
  { id:19, theme:"Fandom & Obsessions", intensity:"Light", questions:["What's something you've gone deep on — a hobby, a subject, a fandom — that most people don't know about?","Is there a niche interest of yours that you wish other people would just get?","What's a rabbit hole you've fallen into that surprised you with how much you loved it?"] },
  { id:20, theme:"Future Tech", intensity:"Light", questions:["If you could have one piece of technology that doesn't exist yet, what would it do?","Is there a sci-fi technology that you're genuinely excited might exist in your lifetime?","Would you try living completely offline for one week — and how do you think you'd actually do?"] },
  { id:21, theme:"Morning vs. Night", intensity:"Light", questions:["Are you a morning person or a night owl — and do you accept that about yourself?","What does your ideal morning look like when there's nowhere you have to be?","What do you do in those quiet moments before sleep that no one else really knows about?"] },
  { id:22, theme:"Social Energy", intensity:"Light", questions:["After a big social event, do you feel energized or do you need to decompress alone?","What's the ideal size of a gathering for you to actually enjoy yourself?","Do you have a 'social version' of yourself that's different from the person you are at home?"] },
  { id:23, theme:"Collecting & Keeping", intensity:"Light", questions:["Is there something you collect — physically or mentally — that reveals something about who you are?","What's the most sentimental object you own, and what's its story?","If your home burned down and you could save three objects, what would they be?"] },
  { id:24, theme:"Alter Egos", intensity:"Light", questions:["If you had an alter ego with a different name and personality, who would they be?","What career would your alter ego have that your current self would never pursue?","Is there a version of you from your past that would be surprised by who you are today?"] },
  { id:25, theme:"Color & Mood", intensity:"Light", questions:["If you had to assign a color to your personality, what would it be — and would others agree?","What color makes you feel most at home, and does your living space actually reflect that?","If your current chapter of life had a color palette, what would it look like?"] },
  { id:26, theme:"The Road Not Taken", intensity:"Medium", questions:["What's one decision you made that you thought was a mistake at the time but turned out to shape you well?","Is there a version of your life you imagine sometimes — a path you didn't take — that still intrigues you?","If you could go back and give your 25-year-old self one piece of advice, what would it be — and would they listen?"] },
  { id:27, theme:"Beauty & Aesthetics", intensity:"Medium", questions:["What's the most beautiful thing you've ever seen that had nothing to do with a person?","Is there an art form — music, painting, dance, architecture — that moves you in a way you can't quite explain?","What does beauty mean to you now compared to what it meant when you were younger?"] },
  { id:28, theme:"Culture & Belonging", intensity:"Medium", questions:["What cultural tradition — from your background or someone else's — do you wish was a bigger part of your life?","If you could spend one year living inside a completely different culture, which would it be and what draws you there?","What part of your cultural background do you carry proudly, and is there anything you've chosen to leave behind?"] },
  { id:29, theme:"Stories We Tell", intensity:"Medium", questions:["What's a book, film, or story that genuinely changed how you see the world?","Is there a fictional character you've always privately identified with?","If someone was writing a novel loosely based on your life, what would be the title and the central tension?"] },
  { id:30, theme:"Friendship & Loyalty", intensity:"Medium", questions:["What quality do you value most in a friend — and do you think you embody it yourself?","Is there a friendship you've lost that you still think about?","What's the most generous thing a friend has ever done for you?"] },
  { id:31, theme:"Courage & Fear", intensity:"Medium", questions:["What's something you've done that took more courage than anyone around you realized?","Is there a fear you've overcome that changed what you thought was possible for yourself?","What's something you're still afraid of that you think you'll eventually have to face?"] },
  { id:32, theme:"Love Languages", intensity:"Medium", questions:["How do you most naturally show someone you love them — and is it the same way you want to receive love?","What's something small that someone does that makes you feel deeply cared for?","Is there a way you wish people showed up for you that you've never quite known how to ask for?"] },
  { id:33, theme:"First Times", intensity:"Medium", questions:["What's a 'first' in your life that you remember with surprising clarity?","What was the first moment you felt truly adult — not just older, but actually grown?","Is there a first experience that shaped your tastes, values, or direction in ways you still feel today?"] },
  { id:34, theme:"Nature & Place", intensity:"Medium", questions:["Is there a place in the world where you've felt most like yourself? What was it about that place?","Are you more energized by ocean, forest, desert, or mountains — and does that say something true about you?","If you had to live completely off the grid for one year, how do you think you'd actually do?"] },
  { id:35, theme:"Ambition & Drive", intensity:"Medium", questions:["What do you want to be remembered for — not famous, just remembered by the people who knew you?","Is there something you're working toward that feels truly yours, not shaped by what others expect?","What does success feel like in your body — not your résumé — when you've actually achieved something real?"] },
  { id:36, theme:"Risk & Adventure", intensity:"Medium", questions:["What's the biggest risk you've ever taken — and would you take it again?","Do you think you're more of a risk-taker or a safety-seeker — and does that align with who you want to be?","What's one risk you've been talking yourself out of that part of you knows you should take?"] },
  { id:37, theme:"Mentors & Influences", intensity:"Medium", questions:["Who is the person outside your family who influenced you most — and do they know it?","Is there a teacher, coach, or mentor whose words have stayed with you longer than they probably realize?","What's the most important thing someone taught you that had nothing to do with a classroom?"] },
  { id:38, theme:"The Creative Self", intensity:"Medium", questions:["Do you consider yourself creative — and does your answer depend on how you define the word?","What's something you've made, built, or created that you're genuinely proud of?","If you could dedicate serious time to one creative pursuit with no pressure to be good, what would it be?"] },
  { id:39, theme:"Money & Meaning", intensity:"Medium", questions:["What's the best money you've ever spent — not the most expensive, but the most worthwhile?","Is there a way your relationship with money has shifted as you've gotten older?","What would you do differently with your resources if you were no longer trying to impress anyone?"] },
  { id:40, theme:"Changing Your Mind", intensity:"Medium", questions:["What's a belief you held strongly at 20 that you've completely reversed — and what changed it?","Is there something you were once embarrassed about that you've come to appreciate or even love about yourself?","What's the last thing that genuinely made you reconsider your position on something?"] },

  { id:42, theme:"The Body", intensity:"Medium", questions:["Has your relationship with your body changed as you've gotten older — for better or worse?","What physical activity or practice has ever made you feel most at home in your own skin?","What does your body need right now that you've been ignoring?"] },
  { id:43, theme:"Generations", intensity:"Medium", questions:["What did your parents get right that you hope to carry forward in your own way?","Is there something your generation understands that you wish older generations could see more clearly?","What do you think the next generation will understand about life that we're still figuring out?"] },

  { id:48, theme:"Defining Moments", intensity:"Medium", questions:["What's a moment in your life where you felt the narrative shift — where you knew things would be different?","Is there a single conversation that changed the direction of your life?","What's a small, quiet moment that mattered far more than it looked from the outside?"] },

const grid = document.getElementById('cardGrid');
const statsEl = document.getElementById('stats');

function renderCards(filter) {
  grid.innerHTML = '';
  const filtered = filter === 'all' ? cards : cards.filter(c => c.intensity === filter);
  statsEl.textContent = filter === 'all'
    ? `Showing all 216 cards`
    : `Showing ${filtered.length} cards — ${filter}`;

  filtered.forEach(card => {
    const el = document.createElement('div');
    el.className = `card ${card.intensity}`;
    el.innerHTML = `
      <div class="card-accent"></div>
      <div class="card-inner">
        <div class="card-meta">
          <span class="card-number">CARD ${String(card.id).padStart(3,'0')}</span>
          <span class="intensity-badge">${card.intensity}</span>
        </div>
        <div class="card-theme">${card.theme}</div>
        <div class="card-divider"></div>
        <ol>
          ${card.questions.map(q => `<li>${q}</li>`).join('')}
        </ol>
      </div>
    `;
    grid.appendChild(el);
  });
}

document.getElementById('controls').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(btn.dataset.filter);
});

renderCards('all');
</script>
